<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato AI Recommender</title>
    <!-- Modern Typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Preference Collection -->
        <aside class="sidebar glass-panel">
            <div class="logo-container">
                <div class="pulse-ring"></div>
                <h1>Zomato <span>AI</span></h1>
            </div>
            <p class="subtitle">Tell us what you're craving, and our AI will find the perfect spot.</p>
            
            <form id="preference-form">
                <div class="form-group">
                    <label for="location">Location (City/Area)</label>
                    <input type="text" id="location" name="location" placeholder="e.g. Bangalore, Delhi..." required>
                </div>
                
                <div class="form-group">
                    <label for="cuisine">Cuisine</label>
                    <input type="text" id="cuisine" name="cuisine" placeholder="e.g. Italian, North Indian...">
                </div>

                <div class="form-group">
                    <label for="budget">Budget</label>
                    <div class="radio-group">
                        <label><input type="radio" name="budget" value="low"> Low</label>
                        <label><input type="radio" name="budget" value="medium"> Medium</label>
                        <label><input type="radio" name="budget" value="high"> High</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="min_rating">Minimum Rating</label>
                    <input type="number" id="min_rating" name="min_rating" min="0" max="5" step="0.1" placeholder="e.g. 4.0">
                </div>
                
                <div class="form-group">
                    <label for="notes">Special Requests (AI Hints)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="e.g. Romantic vibe, vegan options..."></textarea>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Discover Spots</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </aside>

        <!-- Main Content: Ranked Results -->
        <main class="results-container">
            <!-- Dynamic Groq Summary -->
            <div id="summary-section" class="summary-card glass-panel hidden">
                <div class="sparkle-icon">✨</div>
                <p id="summary-text"></p>
            </div>

            <!-- Loading Skeleton -->
            <div id="loading-state" class="hidden">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden glass-panel error-panel">
                <h2>Oops! Something went wrong.</h2>
                <p id="error-text"></p>
            </div>

            <!-- Results List -->
            <div id="results-list">
                <div class="empty-state">
                    <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&q=80&w=600" alt="Restaurant aesthetic" class="hero-image">
                    <h2>Ready to explore?</h2>
                    <p>Submit your preferences to see personalized AI recommendations.</p>
                </div>
            </div>
        </main>
    </div>

    <footer class="app-footer">
        <div class="system-health">
            <span class="health-dot" id="health-dot"></span>
            <span id="health-status">Checking system health...</span>
        </div>
        <div class="version">v1.0.0</div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
